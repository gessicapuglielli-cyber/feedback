<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Gess Puglielli — Personal hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; background: #e7e2d6; font-family: "Helvetica Neue", Helvetica, sans-serif; height: 100%; }
  #root { width: 100vw; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script id="boot">
// Babel standalone's external <script src=...> loader drops the page's
// query string when resolving relative URLs — but the preview serves files
// only when that token is present. So fetch each JSX file with the search
// string appended, concatenate, compile once, and run.
(async () => {
  const search = location.search;
  const files = [
    "design-canvas.jsx",
    "tweaks-panel.jsx",
    "shared.jsx",
    "variant-editorial.jsx",
    "variant-swiss.jsx",
    "variant-expressive.jsx",
    "app.jsx",
  ];
  const sources = await Promise.all(files.map(async (f) => {
    const r = await fetch(f + search);
    if (!r.ok) throw new Error("fetch " + f + " " + r.status);
    return "// === " + f + " ===\n" + await r.text();
  }));
  const combined = sources.join("\n\n");
  const { code } = Babel.transform(combined, {
    presets: [["react"], ["env", { targets: { esmodules: true } }]],
  });
  // Run in global scope so function declarations attach to window.
  (0, eval)(code);
})().catch((err) => {
  document.body.insertAdjacentHTML(
    "beforeend",
    '<pre style="position:fixed;inset:16px;background:#fff;color:#900;padding:16px;font:12px monospace;white-space:pre-wrap;z-index:99">' +
      (err.stack || err.message || err) +
    "</pre>"
  );
});
</script>

</body>
</html>
